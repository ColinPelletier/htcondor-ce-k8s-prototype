# Security config for local dev/test.
# TOKEN is added to the server-side accepted methods so that local callers
# (condor_submit, condor_ce_trace) can authenticate with a generated token
# rather than relying on FS auth (which is tunneled through the shared-port
# proxy and always appears as the 'condor' service account).
# Do not use this config in production — use SciTokens or X.509 instead.
 
SEC_DEFAULT_AUTHENTICATION_METHODS = TOKEN, FS
SEC_CLIENT_AUTHENTICATION_METHODS  = TOKEN, FS
 
# Override the CE default which only allows FS/SCITOKENS/SSL on the schedd
SCHEDD.SEC_WRITE_AUTHENTICATION_METHODS = TOKEN, FS
SCHEDD.SEC_READ_AUTHENTICATION_METHODS  = TOKEN, FS
 
ALLOW_READ  = *
# *@password covers pool-password-based daemon auth (condor@password)
ALLOW_WRITE = *@$(UID_DOMAIN), condor@$(UID_DOMAIN)/$(FULL_HOSTNAME), *@password
DENY_WRITE  = anonymous@*, *@unmapped